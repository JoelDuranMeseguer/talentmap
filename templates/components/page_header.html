<div class="tm-page-head d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
  <div>
    <h1 class="tm-page-title mb-1">{{ title }}</h1>
    {% if subtitle %}<p class="tm-page-subtitle mb-0">{{ subtitle }}</p>{% endif %}
  </div>
  {% if actions %}
    <div class="d-flex flex-wrap gap-2">{{ actions|safe }}</div>
  {% endif %}
</div>
